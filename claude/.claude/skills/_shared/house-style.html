<!--
  Shared house style for HTML artifacts.

  This is NOT a skill (no SKILL.md) and not a standalone page. It is the single
  source of the visual look + click-to-copy behavior shared by the artifact
  skills (/debrief, /qa-handoff, /walkthrough, /prd-view).

  How skills use it:
  - Inline the <style> block below into the output's <head>.
  - Inline the <script> block below just before the output's </body>.
  - Each skill supplies its own document BODY structure; this file only
    supplies the look and the copy helper. Keep both blocks verbatim so every
    artifact stays a single self-contained, portable file (no external assets,
    no build step).
  - When a skill needs a genuinely new component, add its CSS here so the look
    stays consistent across artifacts — do not fork per-skill styles.

  Look: cool slate text on light paper neutrals, teal accent, 18px base.
  Light is :root; dark is supplied automatically via prefers-color-scheme.

  Component vocabulary (classes available to every artifact):
  - Layout:     .wrap (260px sidebar + content grid), nav.toc (sticky TOC),
                main, header.doc, .eyebrow, h1, dl.meta (metadata grid).
  - Sections:   details.section > summary  (collapsible; open underlined header
                with a caret marker, add `open` to expand by default),
                .section-body.
  - Prose:      h3, h4, p, a, code (light inline chip), table/th/td.
  - Code:       pre — dark block in both light/dark mode. For hand-curated
                snippets, wrap tokens in `pre .c` (comment / delimiter),
                `pre .k` (keyword), `pre .s` (string). Plain <pre><code> still
                renders fine (monochrome light-on-dark).
  - Tables:     render as an inset white card (surface bg, border, radius) with
                horizontal rules inside — no per-cell box. Works on bare
                markdown tables; no wrapper needed.
  - Callouts:   .callout (info, default), .callout.warn, .callout.flag (alert);
                put a .label inside for the heading.
  - Rundown:    .rundown > .item (each with an optional .ico emoji + .body) —
                icon-led key points separated by airy hairline dividers. Use
                for "known gaps", "things to ignore", quick fact lists.
  - Stories:    .story > .story-head (+ .role-pill), .story-body,
                .story .expect (green "expected result" text).
  - Diagrams:   figure.diagram > svg + figcaption (inline SVG; never ASCII art).
  - Tags:       .tag.good / .tag.warn / .tag.bad (small status pills).
  - Copy:       button.copy[data-copy="VALUE"] — click-to-copy control; copies
                data-copy (falling back to text). Use for anything the reader
                will paste (credentials, emails, URLs).
  - Button:     .btn — primary CTA. Works on both <button> and <a>.
  - Checklist:  ul.checklist > li > label > input[type=checkbox] — interactive
                checkboxes the reader can tick.
  - Footer:     footer.doc.
  - Metrics:    .metrics (grid) > .metric > .v (number) + .k (label) — the
                at-a-glance summary strip under a doc header.
  - Keyword:    .kw — RFC keyword chip (MUST/SHOULD/MAY) for spec text.
  - TOC extras: nav.toc .crumb (breadcrumb), .ttl (doc title), a > .n (section
                number), and .srcbox (the "source of truth" box).
  - Section §:  details.section > summary .badge — a small right-aligned tag
                (e.g. "§3") marking which source section a card renders.
  - Fields:     in tables, .pill (type), .req (required marker), .opt (optional
                / default marker) — for data-model field tables.

  The click-to-copy <script> below is the ONLY shared script. A skill that
  needs richer interactivity adds its own small vanilla <script> in its own
  template — not here.
-->
<style>
  :root {
    --bg:#f7f5f0; --surface:#ffffff; --surface-2:#edeae3; --border:#e4e0d7;
    --strong:#1f2933; --text:#515b66; --muted:#7b8794;
    --accent:#2a6f6b; --accent-soft:#e0edeb;
    --good:#2c7a52; --warn:#94701d; --bad:#b03d30;
    --pre-bg:#1f2530; --pre-text:#cdd6e0;
    --tok-c:#8693a1; --tok-k:#8fd3c8; --tok-s:#e6c07b;
    --radius: 11px;
    --maxw: 1160px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#14171c; --surface:#1b1f26; --surface-2:#232932; --border:#2e343d;
      --strong:#eef1f5; --text:#bcc5d0; --muted:#828d9b;
      --accent:#5cc2bb; --accent-soft:#143030;
      --good:#5cbf8d; --warn:#d4ad5e; --bad:#e87d6e;
      --pre-bg:#0e1116; --pre-text:#cdd6e0;
      --tok-c:#6b7682; --tok-k:#7fd0c5; --tok-s:#e6c07b;
    }
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--sans); line-height: 1.68; font-size: 18px;
  }
  strong, b { color: var(--strong); }
  .wrap { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 46px; max-width: var(--maxw); margin: 0 auto; padding: 38px 24px 96px; }
  /* ---- Table of contents ---- */
  nav.toc { position: sticky; top: 24px; align-self: start; font-size: 14.5px; max-height: calc(100vh - 48px); overflow-y: auto; }
  nav.toc h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 12px; }
  nav.toc ol { list-style: none; margin: 0; padding: 0; }
  nav.toc li { margin: 0 0 8px; }
  nav.toc a { color: var(--muted); text-decoration: none; display: block; padding: 5px 11px; border-left: 2px solid transparent; border-radius: 0 6px 6px 0; }
  nav.toc a:hover { background: var(--surface); border-left-color: var(--accent); color: var(--accent); }
  nav.toc .crumb { font-size: 11.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--accent); margin: 0 0 4px; }
  nav.toc .ttl { font-size: 17px; font-weight: 700; line-height: 1.25; margin: 0 0 16px; color: var(--strong); }
  nav.toc a .n { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 6px; }
  .srcbox { font-size: 12.5px; color: var(--muted); background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; margin-top: 16px; }
  .srcbox b { color: var(--strong); }
  .srcbox code { font-family: var(--mono); font-size: 12px; }
  /* ---- Main column ---- */
  main { min-width: 0; }
  header.doc { border-bottom: 1px solid var(--border); padding-bottom: 28px; margin-bottom: 10px; }
  .eyebrow { color: var(--accent); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .07em; margin: 0 0 8px; }
  header.doc h1 { font-size: 34px; line-height: 1.18; margin: 0 0 18px; letter-spacing: -.015em; color: var(--strong); }
  dl.meta { display: grid; grid-template-columns: max-content 1fr; gap: 8px 18px; margin: 0; font-size: 15px; }
  dl.meta dt { color: var(--muted); font-weight: 600; }
  dl.meta dd { margin: 0; }
  /* ---- Metric strip ---- */
  .metrics { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin: 24px 0 8px; }
  .metric { border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; background: var(--surface); }
  .metric .v { font-size: 24px; font-weight: 700; line-height: 1; color: var(--strong); }
  .metric .k { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.3; }
  /* ---- Sections: OPEN underlined headers (collapsible, no box) ---- */
  details.section { margin: 30px 0; }
  details.section > summary {
    cursor: pointer; list-style: none; font-size: 22px; font-weight: 600; color: var(--strong);
    padding: 0 0 10px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; letter-spacing: -.01em;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary::before {
    content: "›"; display: inline-block; transition: transform .15s ease;
    color: var(--muted); font-size: 19px; line-height: 1; font-weight: 400;
  }
  details.section[open] > summary::before { transform: rotate(90deg); }
  details.section > summary .badge { margin-left: auto; font-family: var(--mono); font-size: 11.5px; font-weight: 600; color: var(--muted); background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 2px 10px; }
  .section-body { padding: 16px 0 0; }
  h3 { font-size: 19px; margin: 26px 0 9px; letter-spacing: -.01em; color: var(--strong); }
  h4 { font-size: 14.5px; margin: 22px 0 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  p { margin: 13px 0; }
  a { color: var(--accent); }
  code { font-family: var(--mono); font-size: 0.9em; background: var(--surface-2); padding: 0.15em 0.42em; border-radius: 5px; }
  /* ---- Code blocks: cool-dark in BOTH modes, with optional syntax tokens ---- */
  pre { background: var(--pre-bg); color: var(--pre-text); border-radius: var(--radius); padding: 16px 18px; overflow-x: auto; font-size: 14px; line-height: 1.6; }
  pre code { background: none; padding: 0; font-size: inherit; color: inherit; }
  pre .c { color: var(--tok-c); }   /* comment / delimiter */
  pre .k { color: var(--tok-k); }   /* keyword */
  pre .s { color: var(--tok-s); }   /* string */
  /* ---- Tables: inset on a white card, horizontal rules inside ---- */
  table { border-collapse: separate; border-spacing: 0; width: 100%; margin: 18px 0; font-size: 15px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  th, td { text-align: left; padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  th { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  /* ---- Callouts ---- */
  .callout { border-left: 4px solid var(--accent); background: var(--accent-soft); border-radius: 0 var(--radius) var(--radius) 0; padding: 14px 18px; margin: 20px 0; }
  .callout.warn { border-left-color: var(--warn); background: color-mix(in srgb, var(--warn) 11%, var(--bg)); }
  .callout.flag { border-left-color: var(--bad); background: color-mix(in srgb, var(--bad) 11%, var(--bg)); }
  .callout .label { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 5px; color: var(--strong); }
  /* ---- Rundown: icon-led points with airy hairline dividers ---- */
  .rundown { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); padding: 2px 22px; margin: 20px 0; }
  .rundown .item { display: flex; gap: 14px; padding: 15px 0; border-bottom: 1px solid var(--border); }
  .rundown .item:last-child { border-bottom: none; }
  .rundown .ico { flex: none; width: 24px; text-align: center; font-size: 17px; line-height: 1.55; }
  .rundown .item .body { color: var(--text); }
  /* ---- Story / step cards ---- */
  .story { border: 1px solid var(--border); border-radius: var(--radius); margin: 20px 0; overflow: hidden; background: var(--surface); }
  .story > .story-head { background: var(--surface-2); padding: 12px 18px; font-weight: 600; font-size: 16px; color: var(--strong); border-bottom: 1px solid var(--border); }
  .story .role-pill { display: inline-block; font-size: 12.5px; font-weight: 600; color: var(--accent); background: var(--accent-soft); border-radius: 999px; padding: 2px 11px; margin-left: 8px; }
  .story ol { margin: 12px 0; padding-left: 28px; }
  .story ol li { margin: 8px 0; }
  .story .expect { color: var(--good); font-weight: 500; }
  .story-body { padding: 4px 18px 16px; }
  /* ---- Diagram figure ---- */
  figure.diagram { margin: 22px 0; text-align: center; }
  figure.diagram svg { max-width: 100%; height: auto; }
  figure.diagram figcaption { color: var(--muted); font-size: 13px; margin-top: 9px; }
  /* ---- Tags ---- */
  .tag { font-size: 11.5px; font-weight: 600; padding: 2px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
  .tag.good { color: var(--good); background: color-mix(in srgb, var(--good) 15%, var(--bg)); }
  .tag.warn { color: var(--warn); background: color-mix(in srgb, var(--warn) 15%, var(--bg)); }
  .tag.bad { color: var(--bad); background: color-mix(in srgb, var(--bad) 15%, var(--bg)); }
  /* ---- Click-to-copy ---- */
  .copy { cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: inherit; font-family: var(--mono); font-size: 0.85em; padding: 0.12em 0.55em; border-radius: 6px; display: inline-flex; align-items: center; gap: 0.4em; user-select: none; vertical-align: baseline; transition: background .12s ease, border-color .12s ease, color .12s ease; }
  .copy:hover { background: var(--accent-soft); border-color: var(--accent); }
  .copy::after { content: "\29C9"; opacity: 0.55; font-size: 0.9em; }
  .copy.copied { color: var(--good); border-color: var(--good); }
  .copy.copied::after { content: "\2713"; opacity: 1; }
  /* ---- Button (primary CTA; works on <button> or <a>) ---- */
  .btn { display: inline-block; cursor: pointer; font-family: var(--sans); font-size: 15px; font-weight: 600; color: #fff; background: var(--accent); border: 1px solid var(--accent); border-radius: 8px; padding: 9px 17px; text-decoration: none; }
  .btn:hover { filter: brightness(1.08); }
  /* ---- Checklist ---- */
  ul.checklist { list-style: none; margin: 14px 0; padding: 0; }
  ul.checklist li { margin: 10px 0; }
  ul.checklist label { display: flex; gap: 9px; align-items: flex-start; cursor: pointer; }
  ul.checklist input { margin-top: 6px; flex: none; accent-color: var(--accent); }
  footer.doc { margin-top: 46px; padding-top: 18px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13.5px; }
  /* ---- RFC keyword chip (MUST / SHOULD / MAY) ---- */
  .kw { font-family: var(--mono); font-size: 11.5px; font-weight: 700; letter-spacing: .04em; padding: 1px 8px; border-radius: 5px; background: color-mix(in srgb, var(--warn) 14%, var(--bg)); color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 35%, transparent); }
  /* ---- Data-model field markers (used inside tables) ---- */
  .pill { font-family: var(--mono); font-size: 11.5px; padding: 1px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .req { color: var(--bad); font-size: 11.5px; font-weight: 700; }
  .opt { color: var(--muted); font-size: 11.5px; }
  /* ---- Responsive ---- */
  @media (max-width: 820px) {
    .wrap { grid-template-columns: 1fr; gap: 18px; padding: 22px 16px 64px; }
    nav.toc { position: static; max-height: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; background: var(--surface); }
    .metrics { grid-template-columns: repeat(3, 1fr); }
  }
</style>
<script>
  // Click-to-copy. Any [data-copy] element copies its data-copy value
  // (falling back to its text). Modern Clipboard API with a legacy
  // execCommand fallback so it works on file:// and older browsers.
  (function () {
    function flash(el) {
      el.classList.add("copied");
      clearTimeout(el._copyTimer);
      el._copyTimer = setTimeout(function () { el.classList.remove("copied"); }, 1200);
    }
    function legacyCopy(text, el) {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "absolute";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); flash(el); } catch (e) {}
      document.body.removeChild(ta);
    }
    document.addEventListener("click", function (e) {
      var el = e.target.closest("[data-copy]");
      if (!el) return;
      var text = el.getAttribute("data-copy") || el.textContent.trim();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { flash(el); },
          function () { legacyCopy(text, el); });
      } else {
        legacyCopy(text, el);
      }
    });
  })();
</script>
