<!--
  Shared house style for HTML artifacts.

  This is NOT a skill (no SKILL.md) and not a standalone page. It is the single
  source of the visual look + click-to-copy behavior shared by the artifact
  skills (/debrief, /qa-handoff, /walkthrough, /prd-view).

  How skills use it:
  - Inline the style block below into the output's head.
  - Inline the script block below just before the output's closing body tag.
  - Each skill supplies its own document BODY structure; this file only
    supplies the look and the copy helper. Keep both blocks verbatim so every
    artifact stays a single self-contained, portable file (no external assets,
    no build step).

  EXTRACTION GUARDRAIL: never write angle-bracket style or script tags (opening
  or closing) anywhere in THIS comment — refer to them in prose only ("the style
  block", "the script block"). A naive "grab the style/script block" step matches
  the FIRST such tag in the file; if one appears here, the extractor captures
  this comment instead of the real block and the CSS breaks. The only real tags
  must live below this comment.
  - When a skill needs a genuinely new component, add its CSS here so the look
    stays consistent across artifacts — do not fork per-skill styles.

  Look: cool slate text on blue-gray neutrals, blue accent, 16px base, soft
  shadows on white cards. Light is :root; a derived blue-navy dark palette is
  supplied automatically via prefers-color-scheme.

  Layout note — the header is FULL-BLEED. Templates place
  `<header class="hero">` (with an inner `.hero-inner` wrapper) BEFORE the
  `<div class="wrap">` grid, so the navy gradient banner spans the whole page
  width above the sidebar+content row. Everything else lives inside .wrap.

  Component vocabulary (classes available to every artifact):
  - Hero:       header.hero > .hero-inner (full-bleed gradient banner) with
                .eyebrow, h1, optional .sub, dl.meta — all on light-on-navy.
  - Layout:     .wrap (260px sidebar + content grid), nav.toc (sticky TOC),
                main.
  - Sections:   details.section > summary  (collapsible; open underlined header
                with a caret marker, add `open` to expand by default),
                .section-body.
  - Prose:      h3, h4, p, a, code (light bordered chip, blue text),
                table/th/td.
  - Code:       pre — navy block in both light/dark mode (echoes the hero). For
                hand-curated snippets, wrap tokens in `pre .c` (comment /
                delimiter), `pre .k` (keyword), `pre .s` (string). Plain
                pre/code still renders fine (monochrome light-on-navy).
  - Tables:     white card (surface bg, border, radius, soft shadow) with a
                navy thead (white uppercase labels) and zebra-striped rows.
                Works on bare markdown tables; no wrapper needed.
  - Callouts:   .callout (info, default — blue left-rule on a tinted card),
                .callout.warn (amber), .callout.flag (alert/red); put a .label
                inside for the heading.
  - Rundown:    .rundown > .item (each with an optional .ico emoji + .body) —
                icon-led key points on a white card with airy hairline
                dividers; items with no .ico get a blue dot marker. Use for
                "known gaps", "things to ignore", quick fact lists.
  - Stories:    .story > .story-head (+ .role-pill), .story-body,
                .story .expect (green "expected result" text).
  - Diagrams:   figure.diagram > svg + figcaption (inline SVG; never ASCII art).
  - Tags:       .tag.good / .tag.warn / .tag.bad (small status pills).
  - Copy:       button.copy[data-copy="VALUE"] — click-to-copy control; copies
                data-copy (falling back to text). Use for anything the reader
                will paste (credentials, emails, URLs).
  - Button:     .btn — primary CTA. Works on both <button> and <a>.
  - Checklist:  ul.checklist > li > label > input[type=checkbox] — interactive
                checkboxes the reader can tick.
  - Footer:     footer.doc.
  - Metrics:    .metrics (grid) > .metric > .v (number) + .k (label) — the
                at-a-glance summary strip. Render it at the TOP of <main>
                (under the hero), not inside the hero, so the white cards sit
                on the page background.
  - Keyword:    .kw — RFC keyword chip (MUST/SHOULD/MAY) for spec text.
  - TOC extras: nav.toc .crumb (breadcrumb), .ttl (doc title), a > .n (section
                number), and .srcbox (the "source of truth" box).
  - Section §:  details.section > summary .badge — a small right-aligned tag
                (e.g. "§3") marking which source section a card renders.
  - Fields:     in tables, .pill (type), .req (required marker), .opt (optional
                / default marker) — for data-model field tables.

  The click-to-copy script below is the ONLY shared script. A skill that
  needs richer interactivity adds its own small vanilla script in its own
  template — not here.
-->
<style>
  :root {
    --bg:#f1f5f9; --surface:#ffffff; --surface-2:#f8fafc; --border:#e2e8f0;
    --strong:#1e293b; --text:#334155; --muted:#64748b;
    --accent:#1992d4; --accent-bright:#2bb0ed; --accent-deep:#0f2847;
    --accent-code:#024775; --accent-soft:#e0f2fe; --heading:#0f2847;
    --hero-from:#024775; --hero-to:#0f2847;
    --good:#15803d; --warn:#b45309; --bad:#b91c1c;
    --cal-info-rule:#1992d4; --cal-info-fill:#dbeafe;
    --cal-warn-rule:#f59e0b; --cal-warn-fill:#fef3c7;
    --cal-bad-rule:#dc2626;  --cal-bad-fill:#fee2e2;
    --cal-good-fill:#dcfce7;
    --pre-bg:#0f2847; --pre-text:#e2e8f0;
    --tok-c:#64748b; --tok-k:#7dd3fc; --tok-s:#fcd34d;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(15,40,71,0.06);
    --shadow-hero: 0 2px 14px rgba(15,40,71,0.25);
    --maxw: 1160px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#0b1622; --surface:#111f30; --surface-2:#16273b; --border:#243b53;
      --strong:#e6eef7; --text:#b7c5d6; --muted:#7e93ab;
      --accent:#38bdf8; --accent-bright:#5cc6f5; --accent-deep:#0e2a4a;
      --accent-code:#7dd3fc; --accent-soft:#0c2a44; --heading:#cfe0f2;
      --hero-from:#024775; --hero-to:#07223f;
      --good:#4ade80; --warn:#fbbf24; --bad:#f87171;
      --cal-info-rule:#38bdf8; --cal-info-fill:#0e2438;
      --cal-warn-rule:#fbbf24; --cal-warn-fill:#2c2310;
      --cal-bad-rule:#f87171;  --cal-bad-fill:#371718;
      --cal-good-fill:#0e2a1a;
      --pre-bg:#081522; --pre-text:#d6e2f0;
      --tok-c:#6b7d91; --tok-k:#7dd3fc; --tok-s:#fcd34d;
    }
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--sans); line-height: 1.6; font-size: 16px;
  }
  strong, b { color: var(--strong); }
  /* ---- Full-bleed hero (placed BEFORE .wrap in the template) ---- */
  header.hero {
    background: linear-gradient(135deg, var(--hero-from) 0%, var(--hero-to) 100%);
    color: #fff; padding: 44px 0 38px; margin-bottom: 36px; box-shadow: var(--shadow-hero);
  }
  header.hero .hero-inner { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }
  header.hero h1 { font-size: 34px; line-height: 1.15; font-weight: 800; letter-spacing: -.01em; margin: 0 0 14px; color: #fff; }
  header.hero .eyebrow { color: var(--accent-bright); }
  header.hero .sub { color: #cfe6f6; font-size: 16px; margin: -4px 0 16px; }
  header.hero dl.meta dt { color: #9fc6e6; }
  header.hero dl.meta dd { color: #eaf6ff; }
  header.hero dl.meta a { color: #eaf6ff; text-decoration: underline; }
  header.hero code { background: rgba(255,255,255,0.12); border-color: transparent; color: #eaf6ff; }
  .eyebrow { color: var(--accent); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .12em; margin: 0 0 8px; }
  .wrap { display: grid; grid-template-columns: 260px minmax(0, 1fr); gap: 46px; max-width: var(--maxw); margin: 0 auto; padding: 8px 24px 96px; }
  /* ---- Table of contents ---- */
  nav.toc { position: sticky; top: 24px; align-self: start; font-size: 14px; max-height: calc(100vh - 48px); overflow-y: auto; }
  nav.toc h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 12px; }
  nav.toc ol { list-style: none; margin: 0; padding: 0; }
  nav.toc li { margin: 0 0 8px; }
  nav.toc a { color: var(--muted); text-decoration: none; display: block; padding: 5px 11px; border-left: 2px solid transparent; border-radius: 0 6px 6px 0; }
  nav.toc a:hover { background: var(--surface); border-left-color: var(--accent); color: var(--accent); }
  nav.toc .crumb { font-size: 11.5px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--accent); margin: 0 0 4px; padding: 0; border-left: 0; }
  nav.toc .ttl { font-size: 17px; font-weight: 700; line-height: 1.25; margin: 0 0 16px; color: var(--strong); }
  nav.toc a .n { color: var(--muted); font-variant-numeric: tabular-nums; margin-right: 6px; }
  .srcbox { font-size: 12.5px; color: var(--muted); background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; margin-top: 16px; }
  .srcbox b { color: var(--strong); }
  .srcbox code { font-family: var(--mono); font-size: 12px; }
  /* ---- Main column ---- */
  main { min-width: 0; }
  dl.meta { display: grid; grid-template-columns: max-content 1fr; gap: 8px 18px; margin: 0; font-size: 14px; }
  dl.meta dt { color: var(--muted); font-weight: 600; }
  dl.meta dd { margin: 0; }
  .sub { color: var(--muted); }
  /* ---- Metric strip (render at top of main, under the hero) ---- */
  .metrics { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin: 0 0 26px; }
  .metric { border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; background: var(--surface); box-shadow: var(--shadow); }
  .metric .v { font-size: 24px; font-weight: 700; line-height: 1; color: var(--heading); }
  .metric .k { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.3; }
  /* ---- Sections: OPEN underlined headers (collapsible, no box) ---- */
  details.section { margin: 30px 0; }
  details.section > summary {
    cursor: pointer; list-style: none; font-size: 20px; font-weight: 700; color: var(--heading);
    padding: 0 0 8px; border-bottom: 2px solid var(--border);
    display: flex; align-items: center; gap: 12px; letter-spacing: -.01em;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section > summary::before {
    content: "›"; display: inline-block; transition: transform .15s ease;
    color: var(--accent-bright); font-size: 19px; line-height: 1; font-weight: 700;
  }
  details.section[open] > summary::before { transform: rotate(90deg); }
  details.section > summary .badge { margin-left: auto; font-family: var(--mono); font-size: 11.5px; font-weight: 600; color: var(--muted); background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 2px 10px; }
  .section-body { padding: 16px 0 0; }
  h3 { font-size: 17px; margin: 24px 0 9px; letter-spacing: -.01em; color: var(--strong); }
  h4 { font-size: 13px; margin: 20px 0 6px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  p { margin: 14px 0; }
  a { color: var(--accent); }
  code { font-family: var(--mono); font-size: 13px; background: var(--bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; color: var(--accent-code); }
  /* ---- Code blocks: navy in BOTH modes (echoes the hero), syntax tokens ---- */
  pre { background: var(--pre-bg); color: var(--pre-text); border-radius: var(--radius); padding: 16px 18px; overflow-x: auto; font-size: 13.5px; line-height: 1.6; box-shadow: var(--shadow); }
  pre code { background: none; border: 0; padding: 0; font-size: inherit; color: inherit; }
  pre .c { color: var(--tok-c); }   /* comment / delimiter */
  pre .k { color: var(--tok-k); }   /* keyword */
  pre .s { color: var(--tok-s); }   /* string */
  /* ---- Tables: white card, navy thead, zebra rows ---- */
  table { border-collapse: separate; border-spacing: 0; width: 100%; margin: 18px 0; font-size: 14.5px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  thead th { background: var(--accent-deep); color: #fff; text-align: left; padding: 12px 14px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  tbody td { text-align: left; padding: 13px 14px; border-top: 1px solid var(--border); vertical-align: top; }
  tbody tr:nth-child(even) { background: var(--surface-2); }
  /* ---- Callouts (info default; warn; flag) ---- */
  .callout { border-left: 4px solid var(--cal-info-rule); background: var(--cal-info-fill); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 14px 18px; margin: 20px 0; }
  .callout.warn { border-left-color: var(--cal-warn-rule); background: var(--cal-warn-fill); }
  .callout.flag { border-left-color: var(--cal-bad-rule); background: var(--cal-bad-fill); }
  .callout .label { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 5px; color: var(--strong); }
  /* ---- Rundown: icon-led points on a card with hairline dividers ---- */
  .rundown { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); padding: 2px 22px; margin: 20px 0; }
  .rundown .item { display: flex; gap: 14px; padding: 15px 0; border-bottom: 1px solid var(--border); }
  .rundown .item:last-child { border-bottom: none; }
  .rundown .ico { flex: none; width: 24px; text-align: center; font-size: 17px; line-height: 1.55; }
  .rundown .item:not(:has(.ico)) .body { position: relative; padding-left: 20px; }
  .rundown .item:not(:has(.ico)) .body::before { content: ""; position: absolute; left: 0; top: 9px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-bright); }
  .rundown .item .body { color: var(--text); }
  /* ---- Story / step cards ---- */
  .story { border: 1px solid var(--border); border-radius: var(--radius); margin: 20px 0; overflow: hidden; background: var(--surface); box-shadow: var(--shadow); }
  .story > .story-head { background: var(--surface-2); padding: 12px 18px; font-weight: 600; font-size: 16px; color: var(--strong); border-bottom: 1px solid var(--border); }
  .story .role-pill { display: inline-block; font-size: 12.5px; font-weight: 600; color: var(--accent); background: var(--accent-soft); border-radius: 999px; padding: 2px 11px; margin-left: 8px; }
  .story ol { margin: 12px 0; padding-left: 28px; }
  .story ol li { margin: 8px 0; }
  .story .expect { color: var(--good); font-weight: 500; }
  .story-body { padding: 4px 18px 16px; }
  /* ---- Diagram figure ---- */
  figure.diagram { margin: 22px 0; text-align: center; }
  figure.diagram svg { max-width: 100%; height: auto; }
  figure.diagram figcaption { color: var(--muted); font-size: 13px; margin-top: 9px; }
  /* ---- Tags ---- */
  .tag { font-size: 11.5px; font-weight: 600; padding: 2px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
  .tag.good { color: var(--good); background: var(--cal-good-fill); }
  .tag.warn { color: var(--warn); background: var(--cal-warn-fill); }
  .tag.bad { color: var(--bad); background: var(--cal-bad-fill); }
  /* ---- Click-to-copy ---- */
  .copy { cursor: pointer; border: 1px solid var(--border); background: var(--surface-2); color: inherit; font-family: var(--mono); font-size: 0.95em; line-height: 1; padding: 0.2em 0.65em; border-radius: 6px; display: inline-flex; align-items: center; gap: 0.45em; user-select: none; vertical-align: baseline; transition: background .12s ease, border-color .12s ease, color .12s ease; }
  .copy:hover { background: var(--accent-soft); border-color: var(--accent); }
  .copy::after { content: "⧉"; opacity: 0.7; font-size: 1.05em; }
  .copy.copied { color: var(--good); border-color: var(--good); }
  .copy.copied::after { content: "✓"; opacity: 1; }
  /* ---- Button (primary CTA; works on <button> or <a>) ---- */
  .btn { display: inline-block; cursor: pointer; font-family: var(--sans); font-size: 15px; font-weight: 600; color: #fff; background: var(--accent); border: 1px solid var(--accent); border-radius: var(--radius-sm); padding: 9px 17px; text-decoration: none; }
  .btn:hover { filter: brightness(1.08); }
  /* ---- Checklist ---- */
  ul.checklist { list-style: none; margin: 14px 0; padding: 0; }
  ul.checklist li { margin: 10px 0; }
  ul.checklist label { display: flex; gap: 9px; align-items: flex-start; cursor: pointer; }
  ul.checklist input { margin-top: 5px; flex: none; accent-color: var(--accent); }
  footer.doc { margin-top: 46px; padding-top: 18px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13.5px; }
  /* ---- RFC keyword chip (MUST / SHOULD / MAY) ---- */
  .kw { font-family: var(--mono); font-size: 11.5px; font-weight: 700; letter-spacing: .04em; padding: 1px 8px; border-radius: 5px; background: var(--cal-warn-fill); color: var(--warn); border: 1px solid var(--cal-warn-rule); }
  /* ---- Data-model field markers (used inside tables) ---- */
  .pill { font-family: var(--mono); font-size: 11.5px; padding: 1px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .req { color: var(--bad); font-size: 11.5px; font-weight: 700; }
  .opt { color: var(--muted); font-size: 11.5px; }
  /* ---- Responsive ---- */
  @media (max-width: 820px) {
    header.hero { padding: 32px 0 28px; margin-bottom: 24px; }
    header.hero .hero-inner { padding: 0 16px; }
    header.hero h1 { font-size: 27px; }
    .wrap { grid-template-columns: 1fr; gap: 18px; padding: 4px 16px 64px; }
    nav.toc { position: static; max-height: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; background: var(--surface); }
    .metrics { grid-template-columns: repeat(3, 1fr); }
  }
</style>
<script>
  // Click-to-copy. Any [data-copy] element copies its data-copy value
  // (falling back to its text). Modern Clipboard API with a legacy
  // execCommand fallback so it works on file:// and older browsers.
  (function () {
    function flash(el) {
      el.classList.add("copied");
      clearTimeout(el._copyTimer);
      el._copyTimer = setTimeout(function () { el.classList.remove("copied"); }, 1200);
    }
    function legacyCopy(text, el) {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "absolute";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); flash(el); } catch (e) {}
      document.body.removeChild(ta);
    }
    document.addEventListener("click", function (e) {
      var el = e.target.closest("[data-copy]");
      if (!el) return;
      var text = el.getAttribute("data-copy") || el.textContent.trim();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { flash(el); },
          function () { legacyCopy(text, el); });
      } else {
        legacyCopy(text, el);
      }
    });
  })();
</script>
