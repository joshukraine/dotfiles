name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        # zsh-abbr (olets' tap, ~1MB, no dependencies) lets the abbreviation
        # registration test actually run here rather than skip. Without it that
        # test only ever exercises a maintainer's laptop.
        run: >-
          brew install bats-core shellcheck zsh markdownlint-cli2 stow
          olets/tap/zsh-abbr

      - name: Setup test environment
        run: |
          chmod +x tests/helpers/*.bash
          chmod +x bin/.local/bin/*
          echo "$GITHUB_WORKSPACE/bin/.local/bin" >> $GITHUB_PATH
          echo "CI=true" >> $GITHUB_ENV

      - name: Lint shell scripts
        run: ./scripts/lint-shell

      - name: Lint markdown files
        run: markdownlint-cli2 --config markdown/.markdownlint-cli2.yaml "**/*.md"

      - name: Run tests
        run: bats tests/ --recursive
